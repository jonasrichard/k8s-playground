apiVersion: v1
kind: Service
metadata:
  name: fileapi-service
  namespace: {{ .Values.backend.namespace }}
  labels:
    app: fileapi-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.backend.fileapi.port }}
      protocol: TCP
      name: http
  selector:
    app: fileapi